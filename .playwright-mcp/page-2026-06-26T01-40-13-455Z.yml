          - heading "Trusted by the best in business" [level=2] [ref=e5937]
          - paragraph [ref=e5939]: Railway supports great software teams wherever they are. Hear from some of the teams building their products on Railway.
          - link "Read customer stories →" [ref=e5940] [cursor=pointer]:
            - /url: /customers
        - generic [ref=e5941]:
          - generic [ref=e5942]:
            - img
            - paragraph [ref=e5944]: "\"On our previous rent day, we saw traffic of 1,500+ requests per second that were all being fulfilled in under 50 milliseconds, which is really great. Our technical team is really impressed with scale like that.\""
            - generic [ref=e5946]:
              - generic [ref=e5947]: Kartik Aggarwal
              - generic [ref=e5948]: Tech Lead at Bilt
          - generic [ref=e5949]:
            - img
            - paragraph [ref=e5951]: "\"Services that took 1 week to configure elsewhere take 1 day to spin up in Railway. Messy networking like on other cloud platforms doesn't exist on Railway. If you understand basic TCP, you're all set.\""
            - generic [ref=e5953]:
              - generic [ref=e5954]: Daniel Lobaton
              - generic [ref=e5955]: CTO at G2X
          - generic [ref=e5956]:
            - img
            - paragraph [ref=e5958]: "\"Railway streamlines and accelerates our entire operation. It gives us instant observability into our services and makes spinning up self-hosted third-party tools almost effortless. This reduces friction in experimentation and shortens our deployment cycles significantly.\""
            - generic [ref=e5960]:
              - generic [ref=e5961]: Daniel Moretti
              - generic [ref=e5962]: Co-Founder & CTO at Mappa
        - generic [ref=e5963]:

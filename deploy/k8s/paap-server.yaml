apiVersion: v1
kind: ServiceAccount
metadata:
  name: paap-server
  namespace: paap-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: paap-server-cr-manager
rules:
  # 管理 CRD 实例
  - apiGroups: ["paap.io"]
    resources: ["applications", "environments", "serviceinstances", "components"]
    verbs: ["*"]
  - apiGroups: ["paap.io"]
    resources: ["*/status", "*/finalizers"]
    verbs: ["*"]
  # 管理 namespace
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: paap-server-cr-manager
subjects:
  - kind: ServiceAccount
    name: paap-server
    namespace: paap-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: paap-server-cr-manager
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: paap-server-config
  namespace: paap-system
data:
  PORT: "9090"
  DATABASE_URL: "postgres://paap:paap@paap-postgres:5432/paap?sslmode=disable"
---
apiVersion: v1
kind: Secret
metadata:
  name: paap-server-secret
  namespace: paap-system
type: Opaque
stringData:
  jwt-secret: "paap-jwt-secret-change-me"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paap-server
  namespace: paap-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paap-server
  template:
    metadata:
      labels:
        app: paap-server
    spec:
      serviceAccountName: paap-server
      containers:
        - name: paap-server
          image: paap-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
          envFrom:
            - configMapRef:
                name: paap-server-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: paap-server-secret
                  key: jwt-secret
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: paap-server
  namespace: paap-system
spec:
  selector:
    app: paap-server
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30091
  type: NodePort

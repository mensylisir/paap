apiVersion: v1
kind: ServiceAccount
metadata:
  name: paap-server
  namespace: paap-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: paap-server-cr-manager
rules:
  # PAAP 平台本身需要集群最高权限以便安装各种服务组件和平台插件（KubeVirt、KEDA 等）
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
  - nonResourceURLs: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: paap-server-cr-manager
subjects:
  - kind: ServiceAccount
    name: paap-server
    namespace: paap-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: paap-server-cr-manager
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: paap-server-config
  namespace: paap-system
data:
  PORT: "9090"
  DATABASE_URL: "postgres://paap:paap@paap-postgres.paap-system.svc.cluster.local:5432/paap?sslmode=disable"
  PAAP_REGISTRY_HOST_TEMPLATE: "registry.{app}-{env}.paap.local"
  PAAP_CONSOLE_DEBUG_IMAGE: "busybox:1.36"
  # deploy/k8s/configure-auth-endpoints.sh writes exact runtime URLs from
  # PAAP_PUBLIC_URL / KEYCLOAK_PUBLIC_URL or the detected NodePort entrypoints.
  KEYCLOAK_ISSUER_URL: ""
  KEYCLOAK_BACKCHANNEL_ISSUER_URL: ""
  KEYCLOAK_CLIENT_ID: "paap"
---
apiVersion: v1
kind: Secret
metadata:
  name: paap-server-secret
  namespace: paap-system
type: Opaque
stringData:
  jwt-secret: "paap-jwt-secret-change-me"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paap-server
  namespace: paap-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paap-server
  template:
    metadata:
      labels:
        app: paap-server
    spec:
      serviceAccountName: paap-server
      containers:
        - name: paap-server
          image: paap-server:v0.1.541
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
          envFrom:
            - configMapRef:
                name: paap-server-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: paap-server-secret
                  key: jwt-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: paap-server
  namespace: paap-system
spec:
  selector:
    app: paap-server
  ports:
    - port: 9090
      targetPort: 9090
  type: NodePort

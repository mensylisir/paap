apiVersion: v1
kind: ServiceAccount
metadata:
  name: paap-server
  namespace: paap-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: paap-server-cr-manager
rules:
  # 管理 CRD 实例
  - apiGroups: ["paap.io"]
    resources: ["applications", "environments", "serviceinstances", "components"]
    verbs: ["*"]
  - apiGroups: ["paap.io"]
    resources: ["*/status", "*/finalizers"]
    verbs: ["*"]
  # 管理 namespace
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # 发现 NodePort 外部入口时只读节点地址
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # Runtime diagnostics can read pods and open an interactive exec session
  # without granting create on the pod resource itself.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log", "pods/attach", "pods/exec"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: [""]
    resources: ["pods/ephemeralcontainers"]
    verbs: ["get", "update", "patch"]
  # Helm 安装需要的核心资源权限
  - apiGroups: [""]
    resources: ["services", "configmaps", "secrets", "serviceaccounts", "persistentvolumeclaims", "endpoints", "events"]
    verbs: ["*"]
  # Apps 资源（deployments, statefulsets 等）
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["*"]
  # Batch 资源（jobs, cronjobs）
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["*"]
  # Networking 资源
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["*"]
  # 外部访问发现：Gateway/HTTPRoute 只读
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways", "httproutes"]
    verbs: ["get", "list", "watch"]
  # RBAC（为工具创建 service accounts）
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["*"]
  # Policy
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets", "podsecuritypolicies"]
    verbs: ["*"]
  # Storage
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  # Autoscaling
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["*"]
  # API extensions（ArgoCD CRDs 等）
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["*"]
  # Admission webhook（Prometheus 等工具需要）
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["mutatingwebhookconfigurations", "validatingwebhookconfigurations"]
    verbs: ["*"]
  # ArgoCD CRDs
  - apiGroups: ["argoproj.io"]
    resources: ["applications", "appprojects", "applicationsets"]
    verbs: ["*"]
  # kpack / Buildpacks resources for source component CI bootstrap
  - apiGroups: ["kpack.io"]
    resources:
      - clusterbuilders
      - clusterbuildpacks
      - clusterlifecycles
      - clusterstacks
      - clusterstores
      - builders
      - builds
      - images
      - sourceresolvers
    verbs: ["*"]
  # Monitoring CRDs（Prometheus, Grafana）
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["prometheuses", "prometheusrules", "servicemonitors", "podmonitors", "alertmanagers"]
    verbs: ["*"]
  - apiGroups: ["grafana.integreatly.org"]
    resources: ["grafanas", "grafanadashboards", "grafanadatasources"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: paap-server-cr-manager
subjects:
  - kind: ServiceAccount
    name: paap-server
    namespace: paap-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: paap-server-cr-manager
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: paap-server-config
  namespace: paap-system
data:
  PORT: "9090"
  DATABASE_URL: "postgres://paap:paap@paap-postgres.paap-system.svc.cluster.local:5432/paap?sslmode=disable"
  PAAP_REGISTRY_HOST_TEMPLATE: "registry.{app}-{env}.paap.local"
  PAAP_CONSOLE_DEBUG_IMAGE: "busybox:1.36"
---
apiVersion: v1
kind: Secret
metadata:
  name: paap-server-secret
  namespace: paap-system
type: Opaque
stringData:
  jwt-secret: "paap-jwt-secret-change-me"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paap-server
  namespace: paap-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paap-server
  template:
    metadata:
      labels:
        app: paap-server
    spec:
      serviceAccountName: paap-server
      containers:
        - name: paap-server
          image: paap-server:v0.1.486
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
          envFrom:
            - configMapRef:
                name: paap-server-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: paap-server-secret
                  key: jwt-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: paap-server
  namespace: paap-system
spec:
  selector:
    app: paap-server
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30091
  type: NodePort

apiVersion: v1
kind: Namespace
metadata:
  name: paap-system
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: paap-node-registry-agent-config
  namespace: paap-system
data:
  # Replace this sample before applying this optional manifest.
  # Each line is: registry-host[:port]|https://registry-host[:port]|optional-ca-file
  # The host must match the host[:port] used in component image references.
  registries.txt: |
    # registry.shop-dev.example.com:5443|https://registry.shop-dev.example.com:5443|shop-dev-ca.crt
    # harbor-shop-prod.example.com|https://harbor-shop-prod.example.com|corp-ca.crt
  restart-runtime: "false"
  shop-dev-ca.crt: ""
  corp-ca.crt: ""
  sync.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    restart_runtime="$(cat /config/restart-runtime | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"

    if [[ ! -s /config/registries.txt ]]; then
      echo "registries.txt must contain at least one registry entry" >&2
      exit 1
    fi

    synced=0
    while IFS='|' read -r registry_host registry_endpoint ca_file extra; do
      registry_host="$(echo "${registry_host:-}" | xargs)"
      registry_endpoint="$(echo "${registry_endpoint:-}" | xargs)"
      ca_file="$(echo "${ca_file:-}" | xargs)"

      [[ -z "$registry_host" || "$registry_host" =~ ^# ]] && continue

      if [[ -n "${extra:-}" ]]; then
        echo "invalid registry entry for ${registry_host}: expected host|endpoint|optional-ca-file" >&2
        exit 1
      fi
      if [[ "$registry_host" == CHANGE-ME* || "$registry_endpoint" == *CHANGE-ME* ]]; then
        echo "replace sample registry values before applying this DaemonSet" >&2
        exit 1
      fi
      if [[ -z "$registry_endpoint" || "$registry_endpoint" != https://* ]]; then
        echo "registry endpoint for ${registry_host} must be https://<registry-host[:port]>" >&2
        exit 1
      fi

      containerd_dir="/host/etc/containerd/certs.d/${registry_host}"
      docker_dir="/host/etc/docker/certs.d/${registry_host}"
      mkdir -p "$containerd_dir" "$docker_dir"

      ca_line=""
      if [[ -n "$ca_file" ]]; then
        if [[ ! -s "/config/${ca_file}" ]]; then
          echo "CA file /config/${ca_file} for ${registry_host} does not exist or is empty" >&2
          exit 1
        fi
        cp "/config/${ca_file}" "$containerd_dir/ca.crt"
        cp "/config/${ca_file}" "$docker_dir/ca.crt"
        ca_line='  ca = "/etc/containerd/certs.d/'"${registry_host}"'/ca.crt"'
      fi

      {
        echo 'server = "'"${registry_endpoint}"'"'
        echo ''
        echo '[host."'"${registry_endpoint}"'"]'
        echo '  capabilities = ["pull", "resolve", "push"]'
        if [[ -n "$ca_line" ]]; then
          echo "$ca_line"
        fi
      } > "$containerd_dir/hosts.toml"

      echo "synced registry trust config for ${registry_host}"
      echo "containerd: /etc/containerd/certs.d/${registry_host}/hosts.toml"
      echo "docker:     /etc/docker/certs.d/${registry_host}/ca.crt"
      synced=$((synced + 1))
    done < /config/registries.txt

    if [[ "$synced" -eq 0 ]]; then
      echo "registries.txt contains no active registry entries" >&2
      exit 1
    fi

    if [[ "$restart_runtime" == "true" ]]; then
      echo "restart-runtime=true was requested, but this manifest does not restart node runtimes automatically."
      echo "Drain and restart containerd/docker through your node maintenance process."
    fi

    sleep infinity
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: paap-node-registry-agent
  namespace: paap-system
  labels:
    app.kubernetes.io/name: paap-node-registry-agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: paap-node-registry-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paap-node-registry-agent
    spec:
      hostPID: true
      tolerations:
        - operator: Exists
      containers:
        - name: sync-registry-trust
          image: docker.io/alpine/k8s:1.34.1
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "/config/sync.sh"]
          securityContext:
            privileged: true
            runAsUser: 0
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: containerd-certs
              mountPath: /host/etc/containerd/certs.d
            - name: docker-certs
              mountPath: /host/etc/docker/certs.d
      volumes:
        - name: config
          configMap:
            name: paap-node-registry-agent-config
            defaultMode: 0755
        - name: containerd-certs
          hostPath:
            path: /etc/containerd/certs.d
            type: DirectoryOrCreate
        - name: docker-certs
          hostPath:
            path: /etc/docker/certs.d
            type: DirectoryOrCreate

apiVersion: v1
kind: ServiceAccount
metadata:
  name: paap-operator
  namespace: paap-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: paap-operator-manager
rules:
  # Operator 是平台安装执行器，需要能安装内置和用户自定义 Helm 模板中的任意 Kubernetes 资源。
  # 工具 Pod 的运行期权限不使用这里的权限，仍由 platform-manifest.yaml 声明并只投射到本环境 namespace。
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
  - nonResourceURLs: ["*"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: paap-operator-manager
subjects:
  - kind: ServiceAccount
    name: paap-operator
    namespace: paap-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: paap-operator-manager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paap-operator
  namespace: paap-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paap-operator
  template:
    metadata:
      labels:
        app: paap-operator
    spec:
      serviceAccountName: paap-operator
      containers:
        - name: operator
          image: paap-operator:v0.1.48
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: metrics
            - containerPort: 8081
              name: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            limits:
              cpu: "1"
              memory: 2Gi
            requests:
              cpu: 100m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false

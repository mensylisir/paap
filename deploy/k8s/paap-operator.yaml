apiVersion: v1
kind: ServiceAccount
metadata:
  name: paap-operator
  namespace: paap-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: paap-operator-manager
rules:
  # CRD 管理
  - apiGroups: ["paap.io"]
    resources: ["applications", "environments", "serviceinstances", "components"]
    verbs: ["*"]
  - apiGroups: ["paap.io"]
    resources: ["*/status", "*/finalizers"]
    verbs: ["*"]
  # Namespace 管理
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  # RBAC 管理
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["*"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["*"]
  # 工作负载管理
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["services", "configmaps", "secrets", "persistentvolumeclaims"]
    verbs: ["*"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["*"]
  # 网络管理
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies", "ingresses"]
    verbs: ["*"]
  # 配额管理
  - apiGroups: [""]
    resources: ["resourcequotas", "limitranges"]
    verbs: ["*"]
  # 事件记录
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: paap-operator-manager
subjects:
  - kind: ServiceAccount
    name: paap-operator
    namespace: paap-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: paap-operator-manager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paap-operator
  namespace: paap-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paap-operator
  template:
    metadata:
      labels:
        app: paap-operator
    spec:
      serviceAccountName: paap-operator
      containers:
        - name: operator
          image: paap-operator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: metrics
            - containerPort: 8081
              name: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false

---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: components.paap.io
spec:
  group: paap.io
  names:
    kind: Component
    listKind: ComponentList
    plural: components
    singular: component
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .spec.managedBy
      name: ManagedBy
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: Component is the Schema for the components API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ComponentSpec defines the desired state of Component
            properties:
              argocdAppRef:
                description: ArgoCD Application 引用（managedBy=argocd 时使用）
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              deployment:
                description: 部署配置
                properties:
                  env:
                    description: 环境变量
                    items:
                      properties:
                        name:
                          type: string
                        value:
                          type: string
                        valueFrom:
                          properties:
                            secretKeyRef:
                              properties:
                                key:
                                  type: string
                                name:
                                  type: string
                              required:
                              - key
                              - name
                              type: object
                            configMapKeyRef:
                              properties:
                                key:
                                  type: string
                                name:
                                  type: string
                              required:
                              - key
                              - name
                              type: object
                          type: object
                      required:
                      - name
                      type: object
                    type: array
                  image:
                    description: 容器镜像
                    type: string
                  namespace:
                    description: 部署到哪个 namespace
                    type: string
                  replicas:
                    description: 副本数
                    format: int32
                    minimum: 0
                    type: integer
                  resources:
                    description: 资源配置
                    properties:
                      cpu:
                        type: string
                      memory:
                        type: string
                    type: object
                  tag:
                    description: 镜像标签
                    type: string
                required:
                - image
                - namespace
                - replicas
                - tag
                type: object
              environmentRef:
                description: 关联的环境（同 namespace 下的 Environment CR 名）
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              identifier:
                description: 组件标识（K8s 资源用，纯英文）
                pattern: ^[a-z][a-z0-9-]*[a-z0-9]$
                type: string
              ingress:
                description: Ingress 配置
                properties:
                  enabled:
                    type: boolean
                  host:
                    type: string
                  path:
                    type: string
                required:
                - enabled
                type: object
              managedBy:
                default: operator
                description: 谁管理 Deployment：operator / argocd
                enum:
                - operator
                - argocd
                type: string
              name:
                description: 组件名称（展示用，可中文）
                type: string
              service:
                description: 服务配置
                properties:
                  port:
                    format: int32
                    type: integer
                  targetPort:
                    format: int32
                    type: integer
                  type:
                    type: string
                required:
                - port
                - targetPort
                type: object
              type:
                description: 组件类型：frontend / backend / custom
                type: string
            required:
            - deployment
            - environmentRef
            - identifier
            - name
            - type
            type: object
          status:
            description: ComponentStatus defines the observed state of Component
            properties:
              conditions:
                description: 条件
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              deployment:
                description: Deployment 状态
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                  readyReplicas:
                    format: int32
                    type: integer
                  replicas:
                    format: int32
                    type: integer
                  updatedReplicas:
                    format: int32
                    type: integer
                required:
                - name
                - namespace
                - readyReplicas
                - replicas
                - updatedReplicas
                type: object
              observedGeneration:
                description: 观察到的 generation
                format: int64
                type: integer
              phase:
                description: 'Phase: Pending / Creating / Running / Scaling / Deleting
                  / Error'
                type: string
              service:
                description: Service 状态
                properties:
                  clusterIP:
                    type: string
                  name:
                    type: string
                  namespace:
                    type: string
                required:
                - name
                - namespace
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

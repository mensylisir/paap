apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gitea.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "gitea.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    paap.io/environment: {{ .Values.paap.environment | quote }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "gitea.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "gitea.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        paap.io/environment: {{ .Values.paap.environment | quote }}
    spec:
      serviceAccountName: {{ include "gitea.serviceAccountName" . }}
      securityContext:
        fsGroup: 1000
      containers:
        - name: gitea
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: USER_UID
              value: "1000"
            - name: USER_GID
              value: "1000"
            - name: GITEA__database__DB_TYPE
              value: sqlite3
            - name: GITEA__server__ROOT_URL
              value: "http://{{ include "gitea.fullname" . }}:{{ .Values.service.http.port }}/"
            - name: GITEA__security__INSTALL_LOCK
              value: "true"
            - name: GITEA__repository__DEFAULT_BRANCH
              value: "main"
            - name: GITEA__service__DISABLE_REGISTRATION
              value: "true"
          ports:
            - name: http
              containerPort: 3000
            - name: ssh
              containerPort: 22
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
{{ toYaml .Values.resources | indent 12 }}
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - >-
                    for i in $(seq 1 30); do
                    if su git -c "gitea admin user list | grep -q '^1[[:space:]]*{{ .Values.admin.username }}[[:space:]]'"; then
                    exit 0;
                    fi;
                    if su git -c "gitea admin user create --username {{ .Values.admin.username | quote }} --password {{ .Values.admin.password | quote }} --email {{ .Values.admin.email | quote }} --admin --must-change-password=false"; then
                    exit 0;
                    fi;
                    sleep 2;
                    done;
                    exit 1
      volumes:
        - name: data
{{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "gitea.fullname" . }}-data
{{- else }}
          emptyDir: {}
{{- end }}

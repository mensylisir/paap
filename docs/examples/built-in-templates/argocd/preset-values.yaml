# ArgoCD preset values - disable ALL cluster-scoped resources
# Platform manages RBAC externally via platform-manifest.yaml

# Disable cluster-level roles at the top level
createClusterRoles: false
createAggregateRoles: false

configs:
  cm:
    resource.inclusions: |
      - apiGroups:
        - ""
        kinds:
        - Pod
        - Service
        - PersistentVolumeClaim
        - ServiceAccount
        - Endpoints
        - Event
        clusters:
        - "*"
      - apiGroups:
        - apps
        kinds:
        - Deployment
        - StatefulSet
        - ReplicaSet
        clusters:
        - "*"
      - apiGroups:
        - batch
        kinds:
        - Job
        - CronJob
        clusters:
        - "*"
      - apiGroups:
        - networking.k8s.io
        kinds:
        - Ingress
        clusters:
        - "*"
      - apiGroups:
        - autoscaling
        kinds:
        - HorizontalPodAutoscaler
        clusters:
        - "*"

# Controller (application controller)
controller:
  rbac:
    create: false
  serviceAccount:
    create: false
    name: ""

# Server
server:
  rbac:
    create: false
  serviceAccount:
    create: false
    name: ""
  service:
    type: NodePort
    nodePortHttp:
    nodePortHttps:
  # Disable cluster-scoped resources
  clusterAdminAccess:
    enabled: false

# Repo Server
repoServer:
  rbac: []
  serviceAccount:
    create: false
    name: ""

# Dex (SSO)
dex:
  enabled: false
  rbac:
    create: false
  serviceAccount:
    create: false

# Redis
redis:
  rbac:
    create: false
  serviceAccount:
    create: false
    name: ""

# HA components
redis-ha:
  enabled: false

# ApplicationSet
applicationSet:
  replicas: 1
  allowAnyNamespace: false
  rbac:
    create: false
  serviceAccount:
    create: false
    name: ""

# Notifications
notifications:
  enabled: false
  rbac:
    create: false
  serviceAccount:
    create: false

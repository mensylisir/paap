name: mysql-galera
version: 16.0.1
description: "MariaDB Galera 多主 MySQL 协议数据库集群"
catalog:
  docs:
    overview: |
      # MySQL Galera

      MySQL Galera 模板提供兼容 MySQL 协议的多主数据库集群能力，适合需要更高可用性、节点间同步复制和故障切换的关系型数据库场景。它比单节点 MySQL 更复杂，对网络、存储和资源要求也更高。

      在 PAAP 中，该模板适合测试高可用数据库拓扑、验证多节点数据库运行方式，或为需要 MySQL 协议但希望提高可用性的环境提供托管服务。

      适用场景：

      - 业务依赖 MySQL 协议并希望减少单点风险。
      - 需要验证数据库节点故障恢复。
      - 测试环境需要接近生产的多节点数据库。
      - 单节点 MySQL 已不能满足可用性要求。
    install: |
      ## 安装方式

      在资源充足的环境中选择 MySQL Galera 模板安装。安装前应规划节点数、CPU、内存、持久化存储、数据库账号和备份策略。

      注意事项：

      - 不建议在内存紧张的 kind 或本地环境部署多节点 Galera。
      - 所有节点需要稳定网络和持久化卷。
      - 业务连接应通过 Service 访问，不应直连单个 Pod。
      - 生产使用前必须验证备份恢复和故障切换。
    quickstart: |
      ## Quick Start

      应用配置与 MySQL 基本一致：

      ```yaml
      spring:
        datasource:
          url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}
          username: ${MYSQL_USERNAME}
          password: ${MYSQL_PASSWORD}
      ```

      部署组件时选择 MySQL Galera 服务引用，平台会注入 host、port、database、username、password。若应用对事务一致性要求高，应先确认 Galera 写入模式、连接池重试策略和故障切换行为。
observability:
  dashboard_uid: paap-mysql-galera-service
  dashboard_title: MySQL Galera 集群专属大盘
  log_query_template: '{namespace="$namespace"} |~ "(?i)($service|mysql|galera|wsrep|deadlock|slow|replication|sst|ist|error|exception|timeout)"'
  metric_cards:
    - key: cluster_size
      title: 集群节点数
      unit: nodes
      description: Galera wsrep 集群当前在线节点数
      promql: 'max(mysql_global_status_wsrep_cluster_size{namespace="$namespace"})'
    - key: flow_control
      title: 流控暂停比例
      unit: ratio
      description: Galera 因复制压力触发 flow control 的比例
      promql: 'avg(mysql_global_status_wsrep_flow_control_paused{namespace="$namespace"})'
    - key: slow_queries
      title: 慢查询
      unit: queries/s
      description: MySQL 慢查询速率
      promql: 'sum(rate(mysql_global_status_slow_queries{namespace="$namespace"}[5m]))'
    - key: conflicts
      title: 写冲突/回滚
      unit: tx/s
      description: Galera 本地认证失败或写冲突速率
      promql: 'sum(rate(mysql_global_status_wsrep_local_cert_failures{namespace="$namespace"}[5m]))'
permissions:
  toolNamespace:
    rules:
      - apiGroups: [""]
        resources: ["pods", "services", "configmaps", "secrets", "persistentvolumeclaims", "serviceaccounts"]
        verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
      - apiGroups: ["apps"]
        resources: ["deployments", "statefulsets", "replicasets"]
        verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
variable_mapping:
  - platform_var: "tool_namespace"
    helm_var: "serviceAccount.name"
  - platform_var: "tool_namespace"
    helm_var: "fullnameOverride"
  - platform_var: "tool_namespace"
    helm_var: "paap.toolNamespace"
  - platform_var: "primary_namespace"
    helm_var: "paap.primaryNamespace"
  - platform_var: "current_env_name"
    helm_var: "paap.environment"

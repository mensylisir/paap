{{- if and .Values.tls.enabled .Values.tls.autoGenerate (not .Values.tls.secretName) }}
{{- $cn := default "registry.paap.local" .Values.tls.commonName -}}
{{- $ca := genCA (printf "%s-ca" (include "registry.fullname" .)) 3650 -}}
{{- $cert := genSignedCert $cn nil (list $cn (include "registry.fullname" .) (printf "%s.%s.svc" (include "registry.fullname" .) .Release.Namespace) (printf "%s.%s.svc.cluster.local" (include "registry.fullname" .) .Release.Namespace)) 3650 $ca -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "registry.tlsSecretName" . }}
  labels:
    app.kubernetes.io/name: {{ include "registry.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
  ca.crt: {{ $ca.Cert | b64enc }}
{{- end }}

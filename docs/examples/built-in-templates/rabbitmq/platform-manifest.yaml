name: rabbitmq
version: 12.0.0
description: "RabbitMQ 消息队列"
catalog:
  docs:
    overview: |
      # RabbitMQ

      RabbitMQ 是基于 AMQP 的消息队列，适合任务队列、异步通知、削峰填谷、业务事件解耦和可靠投递。它提供 exchange、queue、binding、routing key、ack、dead letter 等机制，适合传统业务消息场景。

      在 PAAP 中，RabbitMQ 可作为环境内中间件、共享服务或外部资源。平台会将 host、port、username、password、vhost 等连接参数通过配置模板注入应用，并在服务目录提供队列积压、连接数和错误日志入口。

      适用场景：

      - 订单、通知、邮件、异步任务处理。
      - 需要确认消费、死信队列和路由规则。
      - 吞吐要求中等但可靠性要求高。
      - Spring Boot、Celery、NestJS 等应用使用队列。
    install: |
      ## 安装方式

      在目标环境或共享资源池选择 RabbitMQ 模板安装。安装前规划 vhost、账号、队列命名、持久化和资源规格。

      安装后建议：

      1. 创建业务 vhost 和最小权限账号。
      2. 在组件部署页选择 RabbitMQ 服务引用。
      3. 配置模板注入连接参数。
      4. 通过管理控制台查看 queue、exchange 和 consumer。
    quickstart: |
      ## Quick Start

      Spring Boot 配置示例：

      ```yaml
      spring:
        rabbitmq:
          host: ${RABBITMQ_HOST}
          port: ${RABBITMQ_PORT}
          username: ${RABBITMQ_USERNAME}
          password: ${RABBITMQ_PASSWORD}
          virtual-host: ${RABBITMQ_VHOST:/}
      ```

      如果队列积压持续增长，检查消费者副本数、消费异常、死信队列、ack 设置和消息处理耗时。后续接入 KEDA 后，可基于队列长度触发组件自动扩容。
observability:
  dashboard_uid: paap-rabbitmq-service
  dashboard_title: RabbitMQ 消息队列专属大盘
  log_query_template: '{namespace="$namespace"} |~ "(?i)($service|rabbitmq|queue|exchange|consumer|channel|connection|alarm|error|exception|timeout)"'
  metric_cards:
    - key: ready_messages
      title: Ready 消息
      unit: messages
      description: 队列中等待投递的消息数量
      promql: 'sum(rabbitmq_queue_messages_ready{namespace="$namespace"})'
    - key: unacked_messages
      title: Unacked 消息
      unit: messages
      description: 已投递但尚未 ACK 的消息数量
      promql: 'sum(rabbitmq_queue_messages_unacked{namespace="$namespace"})'
    - key: publish_rate
      title: 发布速率
      unit: msg/s
      description: 生产者向 RabbitMQ 发布消息的速率
      promql: 'sum(rate(rabbitmq_global_messages_published_total{namespace="$namespace"}[5m]))'
    - key: consumers
      title: 消费者数量
      unit: consumers
      description: 当前队列消费者数量
      promql: 'sum(rabbitmq_queue_consumers{namespace="$namespace"})'
permissions:
  toolNamespace:
    rules:
      - apiGroups: [""]
        resources: ["pods", "services", "configmaps", "secrets", "persistentvolumeclaims", "serviceaccounts"]
        verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
      - apiGroups: ["apps"]
        resources: ["deployments", "statefulsets", "replicasets"]
        verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
variable_mapping:
  - platform_var: "tool_namespace"
    helm_var: "serviceAccount.name"
  - platform_var: "tool_namespace"
    helm_var: "fullnameOverride"
  - platform_var: "tool_namespace"
    helm_var: "paap.toolNamespace"
  - platform_var: "primary_namespace"
    helm_var: "paap.primaryNamespace"
  - platform_var: "current_env_name"
    helm_var: "paap.environment"

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nacos.fullname" . }}
  labels:
    {{- include "nacos.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "nacos.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "nacos.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "nacos.serviceAccountName" . }}
      containers:
        - name: nacos
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8848
            - name: grpc
              containerPort: 9848
            - name: raft
              containerPort: 9849
          env:
            - name: MODE
              value: {{ .Values.mode | quote }}
            - name: PREFER_HOST_MODE
              value: hostname
            - name: NACOS_AUTH_ENABLE
              value: {{ ternary "true" "false" .Values.auth.enabled | quote }}
            - name: JVM_XMS
              value: 256m
            - name: JVM_XMX
              value: 512m
            - name: JVM_XMN
              value: 128m
          readinessProbe:
            httpGet:
              path: /nacos/v1/console/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /nacos/v1/console/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

name: nacos
version: 2.3.2
description: "Nacos 注册中心与配置中心"
catalog:
  docs:
    overview: |
      # Nacos

      Nacos 是注册中心与配置中心，常用于 Spring Cloud Alibaba 体系。它可以同时管理服务发现、动态配置、命名空间、配置分组和配置发布历史。

      在 PAAP 中，Nacos 适合替代 Eureka + Config Server 的组合，作为微服务统一服务发现和配置管理入口。组件配置模板可注入 Nacos 地址、namespace、group、用户名和密码。

      适用场景：

      - Spring Cloud Alibaba 微服务。
      - 需要动态配置发布和回滚。
      - 需要按环境隔离 namespace。
      - 希望服务注册和配置中心使用同一个中间件。
    install: |
      ## 安装方式

      在目标环境或共享资源池安装 Nacos。安装前确认是否需要外部控制台访问、是否启用数据库持久化、是否配置账号密码和 namespace。

      推荐做法：

      1. 为每个环境创建独立 namespace。
      2. 通过配置模板把 Nacos 地址和 namespace 注入组件。
      3. 重要配置变更通过 Nacos 控制台或平台流程审计。
      4. 生产环境使用外部数据库持久化 Nacos 配置。
    quickstart: |
      ## Quick Start

      Spring Cloud Alibaba 配置示例：

      ```yaml
      spring:
        cloud:
          nacos:
            discovery:
              server-addr: ${NACOS_SERVER_ADDR}
              namespace: ${NACOS_NAMESPACE}
            config:
              server-addr: ${NACOS_SERVER_ADDR}
              namespace: ${NACOS_NAMESPACE}
      ```

      部署组件时选择 Nacos 服务引用后，平台会注入 server address、namespace、group 和认证信息。服务未注册时，检查应用依赖、配置项和 Nacos 控制台命名空间是否一致。
observability:
  dashboard_uid: paap-nacos-service
  dashboard_title: Nacos 注册配置中心专属大盘
  log_query_template: '{namespace="$namespace"} |~ "(?i)($service|nacos|naming|config|raft|distro|notify|auth|error|exception|timeout)"'
  metric_cards:
    - key: service_count
      title: 服务数量
      unit: services
      description: Nacos Naming 中注册的服务数量
      promql: 'sum(nacos_monitor{name="serviceCount",namespace="$namespace"})'
    - key: instance_count
      title: 实例数量
      unit: instances
      description: Nacos Naming 中注册的实例数量
      promql: 'sum(nacos_monitor{name="instanceCount",namespace="$namespace"})'
    - key: config_count
      title: 配置数量
      unit: configs
      description: Nacos Config 中托管的配置条目数量
      promql: 'sum(nacos_monitor{name="configCount",namespace="$namespace"})'
    - key: http_errors
      title: Nacos HTTP 5xx
      unit: req/s
      description: Nacos API 5xx 响应速率
      promql: 'sum(rate(http_server_requests_seconds_count{namespace="$namespace",status=~"5.."}[5m]))'
permissions:
  toolNamespace:
    rules:
      - apiGroups: [""]
        resources: ["pods", "services", "configmaps", "secrets", "persistentvolumeclaims", "serviceaccounts"]
        verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
      - apiGroups: ["apps"]
        resources: ["deployments", "statefulsets", "replicasets"]
        verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
variable_mapping:
  - platform_var: "tool_namespace"
    helm_var: "serviceAccount.name"
  - platform_var: "tool_namespace"
    helm_var: "fullnameOverride"
  - platform_var: "tool_namespace"
    helm_var: "paap.toolNamespace"
  - platform_var: "primary_namespace"
    helm_var: "paap.primaryNamespace"
  - platform_var: "current_env_name"
    helm_var: "paap.environment"

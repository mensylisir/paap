# Default values for custom-prometheus
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# 平台注入的全局变量（由 PAAP 平台自动填充）
global:
  # 工具所在的 namespace
  namespace: ""

  # 平台创建的 ServiceAccount 名称
  serviceAccountName: ""

  # 环境标识（dev/staging/prod）
  env: ""

# Prometheus 配置
prometheus:
  # 平台通过 variable_mapping 注入的 namespace 列表
  # 格式：逗号分隔的字符串，如 "ns1,ns2,ns3"
  scrapeNamespaces: ""

# Server 配置
server:
  image:
    repository: prom/prometheus
    tag: v2.45.0
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 200m
      memory: 512Mi

  # 数据持久化
  persistentVolume:
    enabled: true
    size: 10Gi
    storageClass: ""

  # 数据保留时间
  retention: "15d"

  # Service 配置
  service:
    type: ClusterIP
    port: 9090

# RBAC 配置（由平台管理，这里禁用）
rbac:
  create: false

# ServiceAccount 配置（由平台管理，这里禁用）
serviceAccount:
  create: false
  name: ""

# NetworkPolicy 配置（由平台管理，这里禁用）
networkPolicy:
  enabled: false

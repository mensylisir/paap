# 预设值文件
# 这个文件用于禁用 Helm Chart 内置的 RBAC 创建
# 因为 PAAP 平台会统一管理权限

# 禁用 Chart 内置的 RBAC 创建
rbac:
  create: false

# 禁用 Chart 内置的 ServiceAccount 创建
# 平台会自动创建 ServiceAccount 并注入到 Helm values
serviceAccount:
  create: false
  name: ""  # 留空，平台会自动填充

# 禁用内置的 NetworkPolicy（平台统一管理）
networkPolicy:
  enabled: false

# 其他预设值
server:
  replicaCount: 1

  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 200m
      memory: 512Mi

  # 数据持久化
  persistentVolume:
    enabled: true
    size: 10Gi
    storageClass: ""  # 使用集群默认 StorageClass

  # 数据保留时间
  retention: "15d"

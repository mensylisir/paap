type: redis
name: Redis KubeVirt 模板
version: kubevirt-redis-7
category: middleware
description: 基于 KubeVirt 虚拟机模板创建 Redis 服务实例
icon: cloud
installer: raw-yaml
s3Key: service-templates/kubevirt/redis.yaml
installOrder: 130
enabled: true
catalog:
  docs:
    overview: |
      # Redis KubeVirt 模板

      该模板通过 KubeVirt 虚拟机交付 Redis 服务实例。用户创建和绑定的仍然是 Redis 服务，平台内部根据模板维护 VM、Service、Secret 和连接输出。

      KubeVirt Redis 适合需要 VM 隔离、传统运维边界或验证虚拟机中间件生命周期的场景。对于普通缓存场景，容器化 Redis 通常更轻量；对于特殊隔离需求，可选择该模板。
    install: |
      ## 安装方式

      在环境服务弹窗选择 Redis，并选择 `KubeVirt 模板交付`。平台按模板生成虚拟机、服务端口和连接凭据。

      前置条件：

      - 集群已安装 KubeVirt operator/CRD。
      - 目标环境具备 VM 资源创建权限。
      - Redis 镜像能被节点拉取。
    quickstart: |
      ## Quick Start

      1. 创建 Redis KubeVirt 服务。
      2. 等待 VM 进入 Running。
      3. 在组件配置中选择该 Redis。
      4. 配置模板注入 `REDIS_HOST`、`REDIS_PORT` 和密码变量。

      如果连接失败，检查 VM 状态、Service selector、端口和应用配置模板反选的服务引用。
observability:
  dashboard_uid: paap-redis-service
  dashboard_title: Redis KubeVirt 专属大盘
  log_query_template: '{namespace="$namespace"} |~ "(?i)($service|redis|oom|evict|denied|loading|rdb|aof|error|exception|timeout)"'
  metric_cards:
    - key: hit_ratio
      title: 缓存命中率
      unit: "%"
      description: keyspace hits / (hits + misses)
      promql: 'sum(rate(redis_keyspace_hits_total{namespace="$namespace"}[5m])) / (sum(rate(redis_keyspace_hits_total{namespace="$namespace"}[5m])) + sum(rate(redis_keyspace_misses_total{namespace="$namespace"}[5m]))) * 100'
    - key: memory_used
      title: 内存使用
      unit: bytes
      description: Redis 已使用内存
      promql: 'sum(redis_memory_used_bytes{namespace="$namespace"})'
    - key: evicted_keys
      title: 淘汰 Key
      unit: keys/s
      description: 内存压力导致的 key 淘汰速率
      promql: 'sum(rate(redis_evicted_keys_total{namespace="$namespace"}[5m]))'
runtimeSpec:
  image: docker.io/library/redis:7
  cpu: 500m
  memory: 1Gi
  diskSize: 5Gi
  ports:
    - name: redis
      port: 6379
